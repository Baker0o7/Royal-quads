<!doctype html>
<html>
<head><meta charset="UTF-8"><title>Signing in…</title>
<style>
  body { margin: 0; display: flex; align-items: center; justify-content: center;
         min-height: 100vh; font-family: sans-serif; background: #0d0b09; color: #f5f0e8; flex-direction: column; gap: 12px; }
  p { font-size: 14px; opacity: 0.6; margin: 0; }
  .spinner { width: 28px; height: 28px; border: 2px solid rgba(255,255,255,0.15);
             border-top-color: #c9972a; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="spinner"></div>
<p>Signing in with Google…</p>
<script>
  const hash = new URLSearchParams(window.location.hash.slice(1));
  const credential = hash.get('id_token');
  if (credential && window.opener) {
    window.opener.postMessage({ type: 'google-oauth', credential }, window.location.origin);
    window.close();
  } else {
    document.querySelector('p').textContent = 'Sign-in failed. You can close this window.';
  }
</script>
</body>
</html>
