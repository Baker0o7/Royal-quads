name: Build & Release Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Sync version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i 's/versionName "[^"]*"/versionName "'"$VERSION"'"/'  android/app/build.gradle
          echo "APP_VERSION=$VERSION"       >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "✅ $VERSION ($VERSION_CODE)"

      - name: Prepare keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
            echo "KS_PATH=$PWD/keystore.jks"                      >> "$GITHUB_ENV"
            echo "KS_STOREPASS=${{ secrets.KEYSTORE_STOREPASS }}" >> "$GITHUB_ENV"
            echo "KS_KEYPASS=${{ secrets.KEYSTORE_KEYPASS }}"     >> "$GITHUB_ENV"
            echo "KS_ALIAS=${{ secrets.KEYSTORE_ALIAS }}"         >> "$GITHUB_ENV"
            echo "✅ Using repo keystore"
          else
            keytool -genkeypair \
              -keystore keystore.jks -alias royal-quads \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Royal Quads CI,OU=CI,O=RoyalQuads,L=Mambrui,ST=Coast,C=KE" \
              -storepass cipassword -keypass cipassword -noprompt
            echo "KS_PATH=$PWD/keystore.jks" >> "$GITHUB_ENV"
            echo "KS_STOREPASS=cipassword"   >> "$GITHUB_ENV"
            echo "KS_KEYPASS=cipassword"     >> "$GITHUB_ENV"
            echo "KS_ALIAS=royal-quads"      >> "$GITHUB_ENV"
          fi

      - name: Build split APKs
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease \
            --no-daemon \
            --build-cache \
            --parallel \
            --stacktrace \
            -Pandroid.injected.signing.store.file="$KS_PATH" \
            -Pandroid.injected.signing.store.password="$KS_STOREPASS" \
            -Pandroid.injected.signing.key.alias="$KS_ALIAS" \
            -Pandroid.injected.signing.key.password="$KS_KEYPASS"

      - name: Stage APKs
        run: |
          mkdir -p output
          V="${APP_VERSION}"
          # Rename split APKs
          cp android/app/build/outputs/apk/release/app-arm64-v8a-release.apk \
             "output/Royal-Quads-v${V}-arm64-v8a.apk"
          cp android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk \
             "output/Royal-Quads-v${V}-armeabi-v7a.apk"
          echo "📦 arm64-v8a:   $(du -sh output/Royal-Quads-v${V}-arm64-v8a.apk | cut -f1)"
          echo "📦 armeabi-v7a: $(du -sh output/Royal-Quads-v${V}-armeabi-v7a.apk | cut -f1)"
          ls -lh output/

      - uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-v${{ env.APP_VERSION }}
          path: output/
          retention-days: 90

      - name: Generate tag
        id: tag
        run: |
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "tag=v${APP_VERSION}-${SHA}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 🏍️ Royal Quad Bikes v${{ env.APP_VERSION }}
          body: |
            ## 🏍️ Royal Quad Bikes v${{ env.APP_VERSION }}

            ### Download the right APK for your device

            | APK | Device type |
            |-----|-------------|
            | `Royal-Quads-v${{ env.APP_VERSION }}-arm64-v8a.apk` | ✅ All modern phones (2015+) — **recommended** |
            | `Royal-Quads-v${{ env.APP_VERSION }}-armeabi-v7a.apk` | Older 32-bit Android phones |

            > **Note:** Plain `armeabi` (ARMv5/v6) is no longer supported by the Android NDK
            > or any device running Android 8+. Use `armeabi-v7a` for 32-bit ARM devices.

            ### Install
            1. Download the APK for your device
            2. **Settings → Security → Install unknown apps → enable**
            3. Open APK → Install

            **Default Admin PIN:** `1234`

            ---
            Built from [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          files: |
            output/Royal-Quads-v${{ env.APP_VERSION }}-arm64-v8a.apk
            output/Royal-Quads-v${{ env.APP_VERSION }}-armeabi-v7a.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
