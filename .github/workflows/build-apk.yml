name: Build & Release Flutter APK

on:
  push:
    branches: [flutter]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout flutter branch ──────────────────────────────────────────
      - name: Checkout flutter branch
        uses: actions/checkout@v4
        with:
          ref: flutter
          fetch-depth: 0

      # ── 2. Java 17 ──────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Flutter 3.27.4 ───────────────────────────────────────────────────
      - name: Set up Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      # ── 4. Android environment ───────────────────────────────────────────────
      - name: Prepare Android environment
        run: |
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties
          chmod +x android/gradlew
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            > /dev/null 2>&1

      # ── 5. Flutter dependencies ──────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 6. App icons ─────────────────────────────────────────────────────────
      - name: Inject app icons
        run: |
          pip install Pillow --quiet --break-system-packages
          python3 scripts/inject-icons.py

      # ── 7. Build release APK ─────────────────────────────────────────────────
      - name: Build APK
        run: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --android-skip-build-dependency-validation
          echo "Build exit: $?"

      # ── 8. Locate & stage APK ────────────────────────────────────────────────
      - name: Stage APK
        run: |
          APK=""
          for CANDIDATE in \
            "build/app/outputs/flutter-apk/app-release.apk" \
            "build/app/outputs/apk/release/app-release.apk"
          do
            if [ -f "$CANDIDATE" ]; then
              APK="$CANDIDATE"
              break
            fi
          done

          if [ -z "$APK" ]; then
            APK=$(find "$GITHUB_WORKSPACE/build" -name "app-release.apk" \
                  2>/dev/null | grep -v intermediates | head -1)
          fi

          if [ -z "$APK" ]; then
            echo "ERROR: APK not found"
            find "$GITHUB_WORKSPACE/build" -type f -name "*.apk" 2>/dev/null || true
            exit 1
          fi

          mkdir -p output
          cp "$APK" output/Royal-Quads.apk
          echo "APK size: $(du -sh output/Royal-Quads.apk | cut -f1)"

      # ── 9. Upload artifact ───────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      # ── 10. GitHub Release (tags only) ───────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Royal Quad Bikes ${{ github.ref_name }}"
          body: |
            ## Royal Quad Bikes ${{ github.ref_name }}

            Android APK — install directly on any Android device (no Play Store needed).

            > **Before installing:** Settings › Apps › Special app access › Install unknown apps › Allow

            ### What's in this build
            - **Admin-only** — PIN-protected operator tool
            - **Website Control** — update quads, prices, promos & open status from app
            - **Fleet Management** — live quad status, add / remove / rename bikes
            - **Live Ride Timer** — overtime billing at 100 KES/min
            - **Dashboard** — revenue, analytics, history, daily PDF report
            - **M-Pesa** capture, WhatsApp receipts to both operators
            - **Loyalty Programme** — Bronze → Silver → Gold → Platinum
            - **Pre-bookings**, safety waiver, promo codes, incident log
            - **6 colour themes** — Ocean Breeze light by default
            - **Google Maps** location view in Dunes tab

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Open on Android → tap **Install**
            3. If prompted: Settings › Security › Allow from this source
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
