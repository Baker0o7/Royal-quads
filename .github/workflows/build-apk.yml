name: Build & Release Flutter APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout flutter branch
        uses: actions/checkout@v4
        with:
          ref: flutter
          fetch-depth: 0

      # ── 2. Java ──────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Flutter ───────────────────────────────────────────────────────────
      - name: Set up Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      # ── 4. Android env ───────────────────────────────────────────────────────
      - name: Prepare Android environment
        run: |
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties
          chmod +x android/gradlew
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            > /dev/null 2>&1

      # ── 5. Dependencies ──────────────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 6. Icons ─────────────────────────────────────────────────────────────
      - name: Inject app icons
        run: |
          pip install Pillow --quiet --break-system-packages
          python3 scripts/inject-icons.py

      # ── 7. Build ─────────────────────────────────────────────────────────────
      - name: Build release APK
        run: |
          # Run flutter build apk. Capture exit so we can search for the APK
          # even if Flutter's internal scanner reports a false "not found".
          set +e
          flutter build apk --release --no-tree-shake-icons
          FEXIT=$?
          set -e

          echo "flutter exit: $FEXIT"

          # Flutter 3.x puts APK here; confirm it exists
          APK="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK" ]; then
            # Try alternate Gradle output path
            APK="build/app/outputs/apk/release/app-release.apk"
          fi
          if [ ! -f "$APK" ]; then
            # Exhaustive search
            APK=$(find "$GITHUB_WORKSPACE/build" -name "app-release.apk" \
                  2>/dev/null | grep -v intermediates | head -1)
          fi

          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "APK not found after build — dumping outputs tree:"
            find "$GITHUB_WORKSPACE/build/app" -type f 2>/dev/null | head -30 || true
            # If flutter failed for a real reason (compile error), propagate it
            exit ${FEXIT:-1}
          fi

          mkdir -p output
          cp "$APK" output/Royal-Quads.apk
          echo "✅ APK ready: $(du -sh output/Royal-Quads.apk | cut -f1)"

      # ── 8. Artifact ──────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      # ── 9. Release ───────────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Royal Quad Bikes ${{ github.ref_name }}"
          body: |
            ## Royal Quad Bikes ${{ github.ref_name }}

            Android APK — install directly on any Android device (no Play Store needed).

            > **Before installing:** Settings › Apps › Special app access › Install unknown apps › Allow

            ### What's in this build
            - **Admin-only** — PIN-protected operator tool
            - **Website Control** — update quads, prices, promos & open status from app
            - **Fleet Management** — live quad status, add / remove / rename bikes
            - **Live Ride Timer** — overtime billing at 100 KES/min
            - **Dashboard** — revenue, analytics, history, daily PDF report
            - **M-Pesa** capture, WhatsApp receipts to both operators
            - **Loyalty Programme** — Bronze → Silver → Gold → Platinum
            - **Pre-bookings**, safety waiver, promo codes, incident log
            - **6 colour themes** — Ocean Breeze light by default
            - **Google Maps** location view in Dunes tab

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Open on Android → tap **Install**
            3. If prompted: Settings › Security › Allow from this source
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
