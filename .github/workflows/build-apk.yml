name: Build & Release Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies (skip native modules)
        run: npm install --ignore-scripts

      - name: Build Web App
        run: npm run build
        env:
          GOOGLE_CLIENT_ID: 979880974098-uvtfo8sokk6bemv38h9dm89gfl84raj7.apps.googleusercontent.com

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android Platform
        run: npx cap add android

      - name: Copy App Icons into Android project
        run: |
          pip install Pillow --quiet
          python3 - << 'PYEOF'
          from PIL import Image
          import os, shutil

          src = 'public/logo.png'
          img = Image.open(src)

          sizes = {
            'android/app/src/main/res/mipmap-mdpi/ic_launcher.png':         48,
            'android/app/src/main/res/mipmap-hdpi/ic_launcher.png':         72,
            'android/app/src/main/res/mipmap-xhdpi/ic_launcher.png':        96,
            'android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png':      144,
            'android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png':     192,
            'android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png':   48,
            'android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png':   72,
            'android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png':  96,
            'android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png':144,
            'android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png':192,
          }

          for path, size in sizes.items():
            os.makedirs(os.path.dirname(path), exist_ok=True)
            img.resize((size, size), Image.LANCZOS).save(path, 'PNG')
            print(f'  ✓ {path}')
          PYEOF

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/Royal-Quads.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      - name: Get version tag
        id: version
        run: echo "tag=v$(date +'%Y.%m.%d')-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Royal Quads ${{ steps.version.outputs.tag }}"
          body: |
            ## 🏍️ Royal Quads — Android APK

            **Download `Royal-Quads.apk` below and install on your Android device.**

            > ⚠️ Enable *Install from unknown sources* in Android Settings before installing.

            ### ✨ What's in this build
            - 🔔 **In-app notifications** — ride alerts, overtime warnings, 2-min countdown, badge counter
            - 📲 **WhatsApp alerts** — one-tap send to customer on overtime, waitlist, prebooking confirm
            - 📄 **PDF receipt export** — branded, saveable receipt for every ride
            - 🎨 **8 colour themes** — Desert, Midnight, Ocean, Forest, Sunset, Arctic, Volcanic, Rose
            - 👤 **Role chooser** — Admin / Customer / Guest sign-in flow
            - 🔐 **Google Sign-In** — OAuth via popup (WebView-compatible)
            - 🛡️ **Digital waiver** — signature pad, skip if already signed
            - ⏱️ **Live ride countdown** — ring timer, overtime billing at 100 KES/min
            - 📋 **Admin dashboard** — 9 tabs: fleet, promos, maintenance, damage, staff, waitlist, pre-bookings, analytics
            - 📊 **Analytics** — 7-day revenue chart, peak hours, quad utilisation, customer stats
            - 🗺️ **GPS tracking** — live map per quad IMEI
            - 📅 **Pre-booking** — schedule rides in advance with date picker
            - 🧾 **Receipt history** — star ratings, feedback, print/save
            - 📦 **Packages & promos** — discount codes, multi-ride packages

            ### Install steps
            1. Download `Royal-Quads.apk`
            2. Open Settings → Security → *Install unknown apps* → enable for your file manager
            3. Open the downloaded APK and tap Install
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
