name: Build & Release Android APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build
        env:
          GOOGLE_CLIENT_ID: 979880974098-uvtfo8sokk6bemv38h9dm89gfl84raj7.apps.googleusercontent.com

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Add Android platform
        run: npx cap add android || echo "Android platform already exists, continuing"

      - name: Inject app icons
        run: |
          pip install Pillow --break-system-packages --quiet
          python3 - <<'PYEOF'
from PIL import Image
import os

img = Image.open("public/logo.png").convert("RGBA")
configs = [
  ("android/app/src/main/res/mipmap-mdpi",    48),
  ("android/app/src/main/res/mipmap-hdpi",    72),
  ("android/app/src/main/res/mipmap-xhdpi",   96),
  ("android/app/src/main/res/mipmap-xxhdpi", 144),
  ("android/app/src/main/res/mipmap-xxxhdpi",192),
]
for folder, size in configs:
  os.makedirs(folder, exist_ok=True)
  resized = img.resize((size, size), Image.LANCZOS)
  resized.save(f"{folder}/ic_launcher.png",       "PNG")
  resized.save(f"{folder}/ic_launcher_round.png", "PNG")
  print(f"  ✓ {size}px → {folder}")
PYEOF

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/Royal-Quads.apk
          echo "APK size: $(du -sh output/Royal-Quads.apk | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      - name: Generate version tag
        id: version
        run: |
          echo "tag=v$(date +'%Y.%m.%d')-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Royal Quad Bikes ${{ steps.version.outputs.tag }}"
          body: |
            ## 🏍️ Royal Quad Bikes — Android APK

            **Download `Royal-Quads.apk` below and install on your Android device.**

            > ⚠️ Enable *Install from unknown sources* in Android Settings → Security before installing.

            ### ✨ What's new in v2.7.0
            - 🆕 **New logo** — updated Royal Quad Bikes badge across all surfaces
            - 🔐 **Google Sign-In fixed** — reliable on all Android devices & browsers
            - 🎨 **Auth portal redesigned** — beautiful animated sign-in / sign-up
            - ⚡ **Quick-Start booking** — admins start a ride in seconds from the dashboard
            - 🔍 **History search & date filter** — find any past ride instantly
            - 📊 **Daily cash report** — printable revenue breakdown by day & quad
            - 💚 **M-Pesa UX** — step-by-step payment guide + confirmation code
            - 📱 **PWA** — install from Chrome as a home screen app

            ### Core features
            - 🔔 In-app notifications (overtime, 2-min warning, ride complete)
            - 📲 WhatsApp alerts to customers
            - 📄 PDF receipt export
            - 🎨 8 colour themes (Desert, Midnight, Ocean, Forest, Sunset, Arctic, Volcanic, Rose)
            - ⏱️ Live countdown timer with overtime billing at 100 KES/min
            - 📋 Full admin dashboard — fleet, promos, maintenance, damage, staff, waitlist, pre-bookings
            - 📊 Revenue analytics & charts
            - 🛡️ Digital waiver with signature pad
            - 📅 Pre-booking & waitlist management

            ### Install steps
            1. Download **`Royal-Quads.apk`** below
            2. On your phone: **Settings → Security → Install unknown apps** → enable for Files
            3. Open the APK and tap **Install**
            4. Launch **Royal Quad Bikes** 🏍️
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
