name: Build & Release Flutter APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: pubspec.yaml
          channel: stable
          cache: true

      - name: Create debug keystore & print SHA-1
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair -v \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            > /dev/null 2>&1
          echo "============================================"
          echo "  SHA-1 (register in GCP for Google Sign-In)"
          echo "============================================"
          keytool -list -v \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -storepass android -keypass android \
            | grep "SHA1:"
          echo "  Package: com.royalquadbikes.app"
          echo "============================================"

      - name: Write local.properties
        run: |
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties
          chmod +x android/gradlew

      - name: Flutter pub get
        run: flutter pub get

      - name: Inject app icons
        run: |
          pip install Pillow --break-system-packages --quiet
          python3 scripts/inject-icons.py

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Stage APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/Royal-Quads.apk
          echo "APK size: $(du -sh output/Royal-Quads.apk | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Royal Quad Bikes ${{ github.ref_name }}
          body: |
            ## Royal Quad Bikes ${{ github.ref_name }}

            Android APK — download and install directly.

            > Enable **Install from unknown sources** before installing.

            ### Features
            - Live ride timer + overtime billing (100 KES/min)
            - Extend ride & M-Pesa confirmation
            - Security deposit tracking
            - Pre-bookings, waiver, PDF receipts, WhatsApp
            - Admin dashboard with 7-day revenue chart
            - CSV export, fleet management, daily reports

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Open on your phone → tap Install
            3. If blocked: Settings → Security → Install unknown apps
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
