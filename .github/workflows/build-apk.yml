name: Build & Release Flutter APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout flutter branch
        uses: actions/checkout@v4
        with:
          ref: flutter
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Prepare Android environment
        run: |
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties
          chmod +x android/gradlew
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            2>/dev/null

      - name: Flutter pub get
        run: flutter pub get

      - name: Inject app icons
        run: |
          pip install Pillow --quiet --break-system-packages
          python3 scripts/inject-icons.py

      - name: Build release APK
        run: |
          set +e
          flutter build apk --release --no-tree-shake-icons
          BUILD_EXIT=$?
          set -e
          echo "Flutter exit: $BUILD_EXIT"

          # Gradle succeeded — search everywhere for the APK
          echo "=== All APKs on runner ==="
          find /home/runner /root 2>/dev/null \
            -name "app-release.apk" \
            | grep -v intermediates \
            | grep -v test \
            || echo "(none found)"
          echo "=========================="

          # Try every known path
          APK=""
          for TRY in \
            "$GITHUB_WORKSPACE/build/app/outputs/flutter-apk/app-release.apk" \
            "$GITHUB_WORKSPACE/build/app/outputs/apk/release/app-release.apk" \
            "build/app/outputs/flutter-apk/app-release.apk" \
            "build/app/outputs/apk/release/app-release.apk"
          do
            [ -f "$TRY" ] && APK="$TRY" && echo "Found: $APK" && break
          done

          # Exhaustive search
          if [ -z "$APK" ]; then
            APK=$(find / -name "app-release.apk" 2>/dev/null \
                  | grep -v intermediates | grep -v test | head -1)
            [ -n "$APK" ] && echo "Found via global search: $APK"
          fi

          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "ERROR: APK not found anywhere"
            exit "${BUILD_EXIT:-1}"
          fi

          mkdir -p output
          cp "$APK" output/Royal-Quads.apk
          echo "✅ Staged: $(du -sh output/Royal-Quads.apk | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Royal Quad Bikes ${{ github.ref_name }}"
          body: |
            ## Royal Quad Bikes ${{ github.ref_name }}

            Android APK — install directly on any Android device (no Play Store needed).

            > **Before installing:** Settings › Apps › Special app access › Install unknown apps › Allow

            ### What's in this build
            - **Admin-only** — PIN-protected operator tool
            - **Website Control** — update quads, prices, promos & open status from app
            - **Fleet Management** — live quad status, add / remove / rename bikes
            - **Live Ride Timer** — pause button + live notification
            - **Quick Start** — guide name, commission breakdown, Cash/M-Pesa selector
            - **Dashboard** — revenue, analytics, history, daily PDF report
            - **M-Pesa** capture, WhatsApp receipts to both operators
            - **6 colour themes** — Ocean Breeze light by default

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Open on Android → tap **Install**
            3. If prompted: Settings › Security › Allow from this source
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
