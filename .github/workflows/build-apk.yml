name: Build & Release Flutter APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Java ───────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Flutter (latest stable, no version pin — most reliable) ────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 4. Android prerequisites ──────────────────────────────────────────────
      - name: Bootstrap Android
        run: |
          # Write local.properties so settings.gradle can find flutter.sdk
          # (settings.gradle also reads FLUTTER_ROOT env var as fallback)
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties
          echo "--- local.properties ---"
          cat android/local.properties
          echo "------------------------"
          chmod +x android/gradlew

          # Create debug keystore required by release signingConfig
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            > /dev/null 2>&1
          echo "SHA-1 (register in GCP for Google Sign-In):"
          keytool -list -v \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -storepass android -keypass android \
            | grep "SHA1:"

      # ── 5. Dart dependencies ──────────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 6. App icon injection ─────────────────────────────────────────────────
      - name: Inject app icons
        run: |
          pip install Pillow --break-system-packages --quiet
          python3 scripts/inject-icons.py

      # ── 7. Build ──────────────────────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      # ── 8. Stage ─────────────────────────────────────────────────────────────
      - name: Stage APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/Royal-Quads.apk
          echo "APK size: $(du -sh output/Royal-Quads.apk | cut -f1)"

      # ── 9. Artifact (downloadable from Actions tab, kept 30 days) ────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      # ── 10. GitHub Release ───────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Royal Quad Bikes ${{ github.ref_name }}
          body: |
            ## Royal Quad Bikes ${{ github.ref_name }}

            Android APK — download and install directly.

            > ⚠️ Enable **Install from unknown sources** before installing.
            > Settings → Apps → Special app access → Install unknown apps → Allow

            ### Features
            - Live ride timer + overtime billing (100 KES/min)
            - Extend ride & M-Pesa ref capture at checkout
            - Security deposit tracking with one-tap return
            - Pre-bookings with notes, waiver → ride flow
            - Admin dashboard: fleet, history, daily report
            - 7-day revenue chart + CSV export to Google Sheets
            - Google Sign-In, promo codes, PDF receipts, WhatsApp

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Open it on your phone and tap **Install**
            3. If blocked: Settings → Security → enable **Install unknown apps**
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
