name: Build & Release Flutter APK

on:
  push:
    branches: [main, master, flutter]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Flutter (latest stable — no version pin to avoid lookup failure) ──
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 4. Android bootstrap ─────────────────────────────────────────────────
      - name: Bootstrap Android
        run: |
          # local.properties
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties
          chmod +x android/gradlew

          # Debug keystore (needed by release signingConfig in build.gradle)
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US" \
              > /dev/null 2>&1
            echo "Debug keystore created"
          fi

      # ── 5. Print SHA-1 ───────────────────────────────────────────────────────
      - name: Print debug keystore SHA-1
        continue-on-error: true
        run: |
          echo "======================================================="
          echo "  GOOGLE SIGN-IN — Register this SHA-1 in GCP Console"
          echo "======================================================="
          keytool -list -v \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -storepass android -keypass android \
            | grep -E "SHA1:|SHA-256:"
          echo "  Package : com.royalquadbikes.app"
          echo "  GCP URL : console.cloud.google.com/apis/credentials"
          echo "======================================================="

      # ── 6. Dependencies ──────────────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 7. App icons ─────────────────────────────────────────────────────────
      - name: Inject app icons
        run: |
          pip install Pillow --break-system-packages --quiet
          python3 scripts/inject-icons.py

      # ── 8. Build release APK ─────────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      # ── 9. Stage ─────────────────────────────────────────────────────────────
      - name: Stage APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/Royal-Quads.apk
          echo "APK size: $(du -sh output/Royal-Quads.apk | cut -f1)"

      # ── 10. Artifact (every run) ─────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      # ── 11. GitHub Release (tag pushes only) ─────────────────────────────────
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Royal Quad Bikes ${{ github.ref_name }}"
          body: |
            ## Royal Quad Bikes ${{ github.ref_name }}

            **Android APK** — download and install directly on any Android device.

            > ⚠️ You must enable **Install from unknown sources** before installing.
            > Settings → Apps → Special app access → Install unknown apps → your file manager → Allow

            ### Features
            - Live countdown timer + overtime billing (100 KES/min)
            - Extend ride & end-ride confirmation with M-Pesa ref capture
            - Security deposit tracking with one-tap return
            - Pre-bookings with notes, confirm & Start Ride
            - Waiver → active ride → receipt flow
            - Admin dashboard: fleet, history, tools, daily report
            - 7-day revenue chart + CSV export (Google Sheets ready)
            - Google Sign-In, promo codes, PDF receipts, WhatsApp

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Open it on your phone and tap **Install**
            3. If prompted, enable **Install unknown apps** and retry
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
