name: Build & Release Flutter APK

on:
  push:
    branches: [main, master, flutter]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.4
          channel: stable
          cache: true

      - name: Get Gradle wrapper from Flutter SDK
        run: |
          # gradlew and gradle-wrapper.jar cannot be committed to git (binary).
          # Flutter ships a template project with these files pre-generated.
          # We copy them from the Flutter SDK's template directly.
          TMPL="$FLUTTER_ROOT/packages/flutter_tools/templates/app_shared/android.tmpl"
          if [ -d "$TMPL" ]; then
            cp "$TMPL/gradlew.tmpl" android/gradlew 2>/dev/null || true
            cp "$TMPL/gradle/wrapper/gradle-wrapper.jar" \
               android/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
          fi

          # Fallback: create a throwaway project and copy from it
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            flutter create --platforms=android --no-pub /tmp/gw_seed
            cp /tmp/gw_seed/android/gradlew              android/gradlew
            cp /tmp/gw_seed/android/gradle/wrapper/gradle-wrapper.jar \
               android/gradle/wrapper/gradle-wrapper.jar
          fi

          chmod +x android/gradlew

          # Write SDK paths
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' \
            "$FLUTTER_ROOT" "$ANDROID_HOME" > android/local.properties

          echo "Wrapper ready:"
          ls -lh android/gradlew android/gradle/wrapper/gradle-wrapper.jar

      - name: Get dependencies
        run: flutter pub get

      - name: Inject app icons
        run: |
          pip install Pillow --break-system-packages --quiet
          python3 scripts/inject-icons.py

      - name: Build debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Stage APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-debug.apk output/Royal-Quads.apk
          echo "APK size: $(du -sh output/Royal-Quads.apk | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      - name: Generate release tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
            echo "tag=v$(date +'%Y.%m.%d')-${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Royal Quad Bikes ${{ steps.version.outputs.tag }}
          body: |
            ## Royal Quad Bikes v2.8.0 — Flutter Android APK

            Native Flutter rewrite — download and install on Android.

            > Enable **Install from unknown sources** in Settings first.

            ### Features
            - Live countdown timer + overtime billing (100 KES/min)
            - M-Pesa payment with confirmation code
            - Admin dashboard with PIN lock + Quick-Start booking
            - History search + daily cash report
            - Pre-bookings, safety waiver, PDF receipts, WhatsApp

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Settings > Security > Install unknown apps > enable
            3. Open APK and tap **Install**
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
