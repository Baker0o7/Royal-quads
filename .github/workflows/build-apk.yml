name: Build & Release Flutter APK

on:
  push:
    branches: [main, master, flutter]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.4
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android scaffold
        run: |
          # Generate a clean Flutter project in /tmp to get a working
          # android/ folder (gradlew, Gradle wrapper JAR, build.gradle files).
          # We cannot commit binary files like gradle-wrapper.jar to git.
          flutter create \
            --platforms=android \
            --org=com.royalquadbikes \
            --project-name=royal_quad_bikes \
            /tmp/scaffold

          # Wipe our hand-written android/ and replace with the working scaffold.
          # This gives us: gradlew, gradlew.bat, gradle-wrapper.jar,
          # settings.gradle, build.gradle — all matching Flutter 3.27 exactly.
          rm -rf android
          cp -r /tmp/scaffold/android android

          # Overlay only our app-specific files:
          #   AndroidManifest.xml  — permissions, activity config, app label
          #   MainActivity.kt      — package declaration
          #   res/                 — styles, drawables, string resources
          cp .github/app/AndroidManifest.xml \
             android/app/src/main/AndroidManifest.xml
          cp .github/app/MainActivity.kt \
             android/app/src/main/kotlin/com/royalquadbikes/app/MainActivity.kt
          cp -r .github/app/res/. \
             android/app/src/main/res/

          # Write local.properties so Gradle can locate the SDKs
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' \
            "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties

          echo "Scaffold ready"
          ls android/

      - name: Inject app icons
        run: |
          pip install Pillow --break-system-packages --quiet
          python3 scripts/inject-icons.py

      - name: Build debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Stage APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-debug.apk output/Royal-Quads.apk
          echo "APK size: $(du -sh output/Royal-Quads.apk | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      - name: Generate release tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
            echo "tag=v$(date +'%Y.%m.%d')-${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Royal Quad Bikes ${{ steps.version.outputs.tag }}
          body: |
            ## Royal Quad Bikes v2.8.0 — Flutter Android APK

            Native Flutter rewrite — download and install on Android.

            > Enable **Install from unknown sources** in Settings first.

            ### Features
            - Live countdown timer + overtime billing (100 KES/min)
            - M-Pesa payment with confirmation code
            - Admin dashboard + Quick-Start booking
            - History search + daily cash report
            - Pre-bookings, safety waiver, PDF receipts, WhatsApp

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Settings > Security > Install unknown apps > enable
            3. Open APK and tap **Install**
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
