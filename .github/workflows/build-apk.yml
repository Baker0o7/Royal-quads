name: Build & Release Flutter APK

on:
  push:
    branches: [main, master, flutter]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.4
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Bootstrap Android Gradle wrapper
        run: |
          # Create a throwaway Flutter project in /tmp purely to get:
          #   - android/gradlew  (shell script)
          #   - android/gradle/wrapper/gradle-wrapper.jar  (binary)
          # These files cannot be hand-written or committed to the repo.
          flutter create \
            --platforms=android \
            --org=com.royalquadbikes \
            --project-name=bootstrap \
            /tmp/bootstrap

          # Copy only the Gradle wrapper files into our android/ dir
          cp    /tmp/bootstrap/android/gradlew              android/gradlew
          cp    /tmp/bootstrap/android/gradlew.bat          android/gradlew.bat
          cp -r /tmp/bootstrap/android/gradle/wrapper       android/gradle/wrapper
          chmod +x android/gradlew

          # Tell Gradle where Flutter SDK and Android SDK live
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' \
            "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties

          echo "Gradle wrapper bootstrapped"
          ls android/gradle/wrapper/

      - name: Inject app icons
        run: |
          pip install Pillow --break-system-packages --quiet
          python3 scripts/inject-icons.py

      - name: Build debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Stage APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-debug.apk output/Royal-Quads.apk
          echo "APK size: $(du -sh output/Royal-Quads.apk | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      - name: Generate release tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
            echo "tag=v$(date +'%Y.%m.%d')-${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Royal Quad Bikes ${{ steps.version.outputs.tag }}
          body: |
            ## Royal Quad Bikes v2.8.0 — Flutter Android APK

            Native Flutter/Dart rewrite — download and install on Android.

            > Enable **Install from unknown sources** in Settings before installing.

            ### Features
            - Live countdown timer + overtime billing (100 KES/min)
            - M-Pesa payment with confirmation code
            - Admin dashboard with PIN lock + Quick-Start booking
            - History search + daily cash report
            - Pre-bookings, safety waiver, PDF receipts
            - WhatsApp sharing, Google Sign-In, promo codes

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Settings > Security > Install unknown apps > enable
            3. Open APK and tap **Install**
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
