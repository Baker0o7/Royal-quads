name: Build & Release Flutter APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout flutter branch
        uses: actions/checkout@v4
        with:
          ref: flutter
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Prepare Android environment
        run: |
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties
          chmod +x android/gradlew
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            2>/dev/null

      - name: Flutter pub get
        run: flutter pub get

      - name: Inject app icons
        run: |
          pip install Pillow --quiet --break-system-packages
          python3 scripts/inject-icons.py

      - name: Build release APK
        run: |
          # Capture ALL flutter output — success line says exactly where APK is
          set +e
          flutter build apk --release --no-tree-shake-icons 2>&1 | tee /tmp/flutter_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          echo "Flutter exit: $BUILD_EXIT"

          # Flutter prints: "Built build/app/outputs/flutter-apk/app-release.apk"
          APK_LINE=$(grep -o 'Built [^ ]*app-release\.apk' /tmp/flutter_build.log | head -1 || true)
          if [ -n "$APK_LINE" ]; then
            APK="${APK_LINE#Built }"
            echo "Flutter reported: $APK"
          fi

          # Try known paths if not found in output
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            for TRY in \
              "build/app/outputs/flutter-apk/app-release.apk" \
              "build/app/outputs/apk/release/app-release.apk" \
              "android/app/build/outputs/apk/release/app-release.apk"
            do
              if [ -f "$TRY" ]; then APK="$TRY"; echo "Found: $APK"; break; fi
            done
          fi

          # Last resort
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            APK=$(find "$GITHUB_WORKSPACE" -name "app-release.apk" 2>/dev/null \
                  | grep -v intermediates | head -1)
          fi

          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "=== Build log tail ==="
            tail -30 /tmp/flutter_build.log
            echo "=== Disk usage ==="
            df -h
            exit "${BUILD_EXIT:-1}"
          fi

          mkdir -p output
          cp "$APK" output/Royal-Quads.apk
          echo "✅ $(du -sh output/Royal-Quads.apk | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Royal Quad Bikes ${{ github.ref_name }}"
          body: |
            ## Royal Quad Bikes ${{ github.ref_name }}

            Android APK — install directly on any Android device (no Play Store needed).

            > **Before installing:** Settings › Apps › Special app access › Install unknown apps › Allow

            ### What's in this build
            - **Admin-only** — PIN-protected operator tool
            - **Backup & Restore** — export/import all data as JSON
            - **Quick Start** — per-quad Cash/M-Pesa, guide name + commission
            - **History** — delete booking + guide payment toggle
            - **Live Ride Timer** — pause button + live notification
            - **Website Control** — manage quads, prices, promos from app
            - **Quad icon** throughout the app
            - **6 colour themes** — Ocean Breeze light by default

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Open on Android → tap **Install**
            3. If prompted: Settings › Security › Allow from this source
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
