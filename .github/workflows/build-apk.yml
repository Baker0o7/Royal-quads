name: Build & Release Flutter APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      # Write local.properties right after Flutter is on PATH.
      # settings.gradle also reads FLUTTER_ROOT env var as fallback,
      # but flutter build apk writes it too — belt AND suspenders.
      - name: Write local.properties & create debug keystore
        run: |
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties
          cat android/local.properties
          chmod +x android/gradlew

          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            > /dev/null 2>&1
          echo "SHA-1 (add to GCP Console for Google Sign-In):"
          keytool -list -v \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -storepass android -keypass android \
            | grep "SHA1:"

      - name: Flutter pub get
        run: flutter pub get

      - name: Inject app icons
        run: |
          pip install Pillow --break-system-packages --quiet
          python3 scripts/inject-icons.py

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation

      - name: Stage APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/Royal-Quads.apk
          echo "APK size: $(du -sh output/Royal-Quads.apk | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Royal Quad Bikes ${{ github.ref_name }}
          body: |
            ## Royal Quad Bikes ${{ github.ref_name }}

            Android APK -- install directly on any Android device.

            > **Before installing:** Settings > Apps > Special app access > Install unknown apps > Allow for your file manager

            ### What is in this build
            - Animated splash screen + first-launch onboarding (3 slides)
            - Booking ticket screen with live countdown + scan-to-verify QR code
            - Ride complete screen: confetti, animated KES counter, WhatsApp share
            - Dark / Light mode toggle (persisted across restarts)
            - Mambrui Dunes location tab: painted map, directions, operating hours
            - Admin: 30-day revenue line chart + revenue-by-quad pie chart
            - Redesigned PDF receipt: gold gradient bars, total banner
            - Phone + password auth only (Google Sign-In removed)
            - Haptic feedback on all key interactions

            ### Core features
            - Live ride timer + overtime at 100 KES/min
            - M-Pesa till number copy + confirmation code capture
            - Security deposit tracking with one-tap return
            - Pre-bookings, waiver flow, admin dashboard
            - CSV export, fleet management, promo codes

            ### Install steps
            1. Download **Royal-Quads.apk** below
            2. Open on your Android phone -- tap Install
            3. If blocked: Settings > Security > Install unknown apps > Allow

          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
