name: Build & Release Flutter APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout flutter branch
        uses: actions/checkout@v4
        with:
          ref: flutter
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Prepare Android environment
        run: |
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties
          chmod +x android/gradlew
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            2>/dev/null

      - name: Flutter pub get
        run: flutter pub get

      - name: Inject app icons
        run: |
          pip install Pillow --quiet --break-system-packages
          python3 scripts/inject-icons.py

      - name: Build release APK
        run: |
          # Use flutter build apk. Capture exit code manually so
          # Flutter's false "APK not found" doesn't kill the step.
          set +e
          flutter build apk --release --no-tree-shake-icons
          BUILD_EXIT=$?
          set -e

          echo "Flutter exit: $BUILD_EXIT"

          # Flutter 3.x writes APK here regardless of what its
          # internal scanner reports
          APK="$GITHUB_WORKSPACE/build/app/outputs/flutter-apk/app-release.apk"

          if [ ! -f "$APK" ]; then
            APK="$GITHUB_WORKSPACE/build/app/outputs/apk/release/app-release.apk"
          fi

          if [ ! -f "$APK" ]; then
            APK=$(find "$GITHUB_WORKSPACE/build" -name "app-release.apk" \
                  2>/dev/null | grep -v intermediates | head -1)
          fi

          # Show build tree for diagnosis
          echo "--- build/app tree ---"
          find "$GITHUB_WORKSPACE/build/app" -name "*.apk" 2>/dev/null \
            | grep -v intermediates || echo "(no apks)"
          echo "----------------------"

          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "ERROR: No APK found. Flutter exit was $BUILD_EXIT."
            # If flutter actually failed (real compile error), exit with its code
            [ "$BUILD_EXIT" -ne 0 ] && exit "$BUILD_EXIT" || exit 1
          fi

          mkdir -p output
          cp "$APK" output/Royal-Quads.apk
          echo "✅ $(du -sh output/Royal-Quads.apk | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Royal Quad Bikes ${{ github.ref_name }}"
          body: |
            ## Royal Quad Bikes ${{ github.ref_name }}

            Android APK — install directly on any Android device (no Play Store needed).

            > **Before installing:** Settings › Apps › Special app access › Install unknown apps › Allow

            ### What's in this build
            - **Admin-only** — PIN-protected operator tool
            - **Website Control** — update quads, prices, promos & open status from app
            - **Fleet Management** — live quad status, add / remove / rename bikes
            - **Live Ride Timer** — pause button + live notification
            - **Quick Start** — guide name, commission breakdown, Cash/M-Pesa selector
            - **Dashboard** — revenue, analytics, history, daily PDF report
            - **M-Pesa** capture, WhatsApp receipts to both operators
            - **Loyalty Programme** — Bronze → Silver → Gold → Platinum
            - **6 colour themes** — Ocean Breeze light by default

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Open on Android → tap **Install**
            3. If prompted: Settings › Security › Allow from this source
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
