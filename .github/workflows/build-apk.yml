name: Build & Release Flutter APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout flutter branch
        uses: actions/checkout@v4
        with:
          ref: flutter
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Prepare Android environment
        run: |
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties
          chmod +x android/gradlew
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            2>/dev/null

      - name: Flutter pub get
        run: flutter pub get

      - name: Inject app icons
        run: |
          pip install Pillow --quiet --break-system-packages
          python3 scripts/inject-icons.py

      - name: Build APK (Gradle direct)
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pflutter.sdk="$FLUTTER_ROOT" \
            --no-daemon \
            --stacktrace 2>&1 | tail -40

      - name: Stage APK
        run: |
          # Gradle always writes here — no Flutter scanner involved
          APK="android/app/build/outputs/apk/release/app-release.apk"

          if [ ! -f "$APK" ]; then
            echo "Scanning for APK..."
            APK=$(find . -name "app-release.apk" 2>/dev/null \
                  | grep -v intermediates | head -1)
          fi

          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "ERROR: No APK found"
            find . -name "*.apk" 2>/dev/null | grep -v intermediates || true
            exit 1
          fi

          echo "Found: $APK ($(du -sh "$APK" | cut -f1))"
          mkdir -p output
          cp "$APK" output/Royal-Quads.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Royal Quad Bikes ${{ github.ref_name }}"
          body: |
            ## Royal Quad Bikes ${{ github.ref_name }}

            Android APK — install directly on any Android device (no Play Store needed).

            > **Before installing:** Settings › Apps › Special app access › Install unknown apps › Allow

            ### What's in this build
            - **Admin-only** — PIN-protected operator tool
            - **Backup & Restore** — export/import all data as JSON
            - **Quick Start** — guide name, commission, Cash/M-Pesa selector
            - **History** — guide payment toggle (✅/🚫) + commission per ride
            - **Live Ride Timer** — pause button + live notification
            - **Website Control** — manage quads, prices, promos from app
            - **Dashboard** — revenue, analytics, daily PDF report
            - **6 colour themes** — Ocean Breeze light by default

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Open on Android → tap **Install**
            3. If prompted: Settings › Security › Allow from this source
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
