name: Build & Release Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Extra release notes'
        required: false
        default: ''

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || '979880974098-uvtfo8sokk6bemv38h9dm89gfl84raj7.apps.googleusercontent.com' }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Add Android platform
        run: npx cap add android || true

      - name: Install Pillow
        run: pip install Pillow --break-system-packages --quiet

      - name: Inject app icons
        run: python3 scripts/inject-icons.py

      - name: Sync Capacitor
        run: npx cap sync android

      # ── Version sync from package.json ──────────────────────────────────────
      - name: Sync version into build.gradle
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Convert semver X.Y.Z → integer code  (e.g. 5.0.0 → 50000, 4.9.6 → 40906)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "VERSION=$VERSION  VERSION_CODE=$VERSION_CODE"
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION\"/" android/app/build.gradle
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "APP_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      # ── Signing setup ────────────────────────────────────────────────────────
      - name: Set up release signing
        id: signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using stored release keystore"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/royal-quads.keystore
            echo "SIGNED=true" >> "$GITHUB_ENV"
          else
            echo "No KEYSTORE_BASE64 secret — generating a CI keystore"
            keytool -genkeypair -v \
              -keystore android/app/royal-quads.keystore \
              -alias royal-quads \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Royal Quads CI, OU=CI, O=RoyalQuads, L=Mambrui, ST=Coast, C=KE" \
              -storepass cipassword -keypass cipassword 2>/dev/null
            echo "SIGNED=ci" >> "$GITHUB_ENV"
          fi

      - name: Configure signing in build.gradle
        run: |
          STOREPASS="${{ secrets.KEYSTORE_STOREPASS || 'cipassword' }}"
          KEYPASS="${{ secrets.KEYSTORE_KEYPASS || 'cipassword' }}"
          KEYALIAS="${{ secrets.KEYSTORE_ALIAS || 'royal-quads' }}"
          # Inject signingConfigs block before android { ... defaultConfig
          python3 - <<PYEOF
          import re
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          signing_block = '''
    signingConfigs {
        release {
            storeFile file("royal-quads.keystore")
            storePassword "$STOREPASS"
            keyAlias "$KEYALIAS"
            keyPassword "$KEYPASS"
        }
    }
    '''
          # Add signingConfig reference in release buildType
          content = content.replace(
              'release {',
              'release {\n            signingConfig signingConfigs.release',
              1  # only first occurrence (inside buildTypes)
          )
          # Insert signingConfigs before buildTypes
          content = content.replace('    buildTypes {', signing_block + '    buildTypes {', 1)
          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          print("Signing config injected.")
          PYEOF

      # ── Build release APK ────────────────────────────────────────────────────
      - name: Build release APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease --no-daemon 2>&1 | tail -20

      - name: Stage APK
        run: |
          mkdir -p output
          APK="android/app/build/outputs/apk/release/app-release.apk"
          cp "$APK" "output/Royal-Quads-v${APP_VERSION}.apk"
          # Also keep a fixed-name copy for easy linking
          cp "$APK" "output/Royal-Quads-latest.apk"
          ls -lh output/

      # ── GitHub Release ───────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-v${{ env.APP_VERSION }}
          path: output/Royal-Quads-v${{ env.APP_VERSION }}.apk
          retention-days: 90

      - name: Generate release tag
        id: tag
        run: |
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "tag=v${APP_VERSION}-${SHA}" >> "$GITHUB_OUTPUT"
          echo "TAG=v${APP_VERSION}-${SHA}" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Royal Quad Bikes v${{ env.APP_VERSION }}"
          body: |
            ## 🏍️ Royal Quad Bikes v${{ env.APP_VERSION }}

            Download `Royal-Quads-v${{ env.APP_VERSION }}.apk` below and sideload on your Android device.

            > **Install steps**
            > 1. Download the APK
            > 2. On your phone: **Settings → Security → Install unknown apps** → enable for your browser/Files app
            > 3. Open the downloaded APK and tap **Install**

            ---

            ### What's new in v5.0.0
            - 📊 **Today's Revenue Bar** — admins see live earnings at a glance on the Home screen
            - 🔐 **Signed release APK** — R8 minification, proper signing, `applicationIdSuffix` on debug builds
            - 🔢 **Version sync** — `versionCode`/`versionName` auto-synced from `package.json` on every build
            - 📦 **Smaller APK** — `minifyEnabled true` + `proguard-android-optimize.txt`
            - 🏷️ **Debug suffix** — debug builds get `.debug` suffix so both can coexist on the same device
            ${{ github.event.inputs.release_notes && format('- 📝 {0}', github.event.inputs.release_notes) || '' }}

            ---
            *Built from commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})*
          files: |
            output/Royal-Quads-v${{ env.APP_VERSION }}.apk
          draft: false
          prerelease: false
