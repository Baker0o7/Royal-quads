name: Build & Release Flutter APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Prepare Android environment
        run: |
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties
          chmod +x android/gradlew
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" > /dev/null 2>&1

      - name: Flutter pub get
        run: flutter pub get

      - name: Inject app icons
        run: |
          pip install Pillow --quiet
          python3 scripts/inject-icons.py

      - name: Build and stage APK
        run: |
          set +e
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --android-skip-build-dependency-validation
          FLUTTER_EXIT=$?
          set -e

          echo "Flutter exit code: $FLUTTER_EXIT"
          echo ""
          echo "=== Searching for APK ==="
          find "$GITHUB_WORKSPACE" -name "app-release.apk" 2>/dev/null \
            | grep -v ".git" | grep -v "intermediates" \
            || echo "No app-release.apk found"

          echo ""
          echo "=== build/app/outputs layout ==="
          find "$GITHUB_WORKSPACE/build/app/outputs" -type f 2>/dev/null \
            | head -20 || echo "outputs directory not found"

          # Locate APK — check every known path
          APK=""
          for TRY in \
            "$GITHUB_WORKSPACE/build/app/outputs/flutter-apk/app-release.apk" \
            "$GITHUB_WORKSPACE/build/app/outputs/apk/release/app-release.apk" \
            "build/app/outputs/flutter-apk/app-release.apk" \
            "build/app/outputs/apk/release/app-release.apk"
          do
            if [ -f "$TRY" ]; then
              APK="$TRY"
              echo "APK found: $APK"
              break
            fi
          done

          # Last resort
          if [ -z "$APK" ]; then
            APK=$(find "$GITHUB_WORKSPACE" -name "app-release.apk" \
                  2>/dev/null | grep -v ".git" | grep -v "intermediates" \
                  | head -1)
          fi

          if [ -z "$APK" ]; then
            echo "ERROR: APK not found — Gradle build genuinely failed"
            exit 1
          fi

          mkdir -p output
          cp "$APK" output/Royal-Quads.apk
          echo "SUCCESS: $(du -sh output/Royal-Quads.apk | cut -f1) staged to output/Royal-Quads.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Royal Quad Bikes ${{ github.ref_name }}
          body: |
            ## Royal Quad Bikes ${{ github.ref_name }}

            Android APK — install directly on any Android device.

            > **Before installing:** Settings › Apps › Special app access › Install unknown apps › Allow

            ### What's in this build
            - **Admin-only app** — PIN-protected, no customer-facing screens
            - **Website Control** — update quads/prices/promos/open status from the app
            - **Fleet Management** — live quad status, add/remove/rename
            - **Live ride timer** — overtime billing at 100 KES/min
            - **Admin Dashboard** — revenue, analytics, history, daily report
            - **M-Pesa** capture, PDF receipts, WhatsApp share to operators
            - **Loyalty Programme** — 4-tier points (Bronze→Silver→Gold→Platinum)
            - **Pre-bookings**, safety waiver, promo codes, incident log
            - **6 colour themes** — Ocean Breeze light by default
            - **Google Maps** location view in Dunes tab

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Open on Android → tap **Install**
            3. If blocked: Settings › Security › Install unknown apps › Allow
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
