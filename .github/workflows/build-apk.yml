name: Build & Release Flutter APK

on:
  push:
    branches: [main, master, flutter]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Toolchain ─────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      # ── 3. Android config ────────────────────────────────────────────────────
      - name: Write local.properties
        run: |
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' \
            "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties
          chmod +x android/gradlew

      # ── 4. Print SHA-1 (Google Sign-In reference) ────────────────────────────
      - name: Print debug keystore SHA-1
        run: |
          echo "======================================================="
          echo "  GOOGLE SIGN-IN — SHA-1 for GCP Console"
          echo "======================================================="
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android -keypass android 2>/dev/null \
            | grep "SHA1:"
          echo "  Package: com.royalquadbikes.app"
          echo "======================================================="

      # ── 5. Dependencies ──────────────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── 6. App icons ─────────────────────────────────────────────────────────
      - name: Inject app icons
        run: |
          pip install Pillow --break-system-packages --quiet
          python3 scripts/inject-icons.py

      # ── 7. Build ─────────────────────────────────────────────────────────────
      - name: Build release APK (unsigned)
        run: flutter build apk --release --no-tree-shake-icons

      # ── 8. Stage output ──────────────────────────────────────────────────────
      - name: Stage APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/Royal-Quads.apk
          echo "APK size: $(du -sh output/Royal-Quads.apk | cut -f1)"

      # ── 9. Artifact (always kept even if release fails) ──────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      # ── 10. Tag ──────────────────────────────────────────────────────────────
      - name: Derive release tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            VER=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
            SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
            echo "tag=v${VER}-${SHA}" >> "$GITHUB_OUTPUT"
          fi

      # ── 11. GitHub Release ───────────────────────────────────────────────────
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Royal Quad Bikes ${{ steps.version.outputs.tag }}"
          body: |
            ## Royal Quad Bikes ${{ steps.version.outputs.tag }}

            **Android APK** — download and install directly.

            > Enable **Install from unknown sources** before installing.

            ### Features
            - Live countdown timer + overtime billing (100 KES/min)
            - Extend ride, end-ride confirmation with M-Pesa ref capture
            - Security deposit tracking with return workflow
            - Pre-bookings with notes, confirm & one-tap Start Ride
            - Waiver → active ride → receipt flow
            - Admin dashboard: fleet, history, tools, daily report
            - 7-day revenue chart + CSV export (Google Sheets)
            - Google Sign-In, promo codes, PDF receipts, WhatsApp

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Open the file and tap **Install**
            3. If blocked: Settings → Security → enable **Unknown sources**
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
