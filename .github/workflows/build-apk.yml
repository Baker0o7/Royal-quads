name: Build & Release Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build
        env:
          GOOGLE_CLIENT_ID: 979880974098-uvtfo8sokk6bemv38h9dm89gfl84raj7.apps.googleusercontent.com

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Add Android platform
        run: npx cap add android || true

      - name: Install Pillow
        run: pip install Pillow --break-system-packages --quiet

      - name: Inject app icons
        run: python3 scripts/inject-icons.py

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Stage APK for release
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/Royal-Quads.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      - name: Generate release tag
        id: version
        run: |
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "tag=v$(date +'%Y.%m.%d')-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Royal Quad Bikes ${{ steps.version.outputs.tag }}
          body: |
            ## Royal Quad Bikes — Android APK

            Download `Royal-Quads.apk` below and install on your device.

            > Enable **Install from unknown sources** in Android Settings before installing.

            ### New in v2.7
            - New logo on all surfaces and app icon
            - Google Sign-In fixed on all devices
            - Auth portal redesigned with animated form
            - Quick-Start booking from admin dashboard
            - History search and date filter
            - Daily cash report (printable)
            - M-Pesa step-by-step guide with confirmation code
            - PWA — installable from Chrome

            ### Install
            1. Download Royal-Quads.apk
            2. Settings > Security > Install unknown apps > enable
            3. Open APK and tap Install
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
