name: Build & Release Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Extra release notes'
        required: false
        default: ''

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build
        env:
          GOOGLE_CLIENT_ID: 979880974098-uvtfo8sokk6bemv38h9dm89gfl84raj7.apps.googleusercontent.com

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Add Android platform
        run: npx cap add android || true

      - name: Install Pillow
        run: pip install Pillow --break-system-packages --quiet

      - name: Inject app icons
        run: python3 scripts/inject-icons.py

      - name: Sync Capacitor
        run: npx cap sync android

      # ── Version sync from package.json ──────────────────────────────────────
      - name: Sync version into build.gradle
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "Syncing version $VERSION (code $VERSION_CODE)"
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION\"/" android/app/build.gradle
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      # ── Signing setup ────────────────────────────────────────────────────────
      - name: Set up release keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/royal-quads.keystore
          else
            keytool -genkeypair -v \
              -keystore android/app/royal-quads.keystore \
              -alias royal-quads \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Royal Quads CI, OU=CI, O=RoyalQuads, L=Mambrui, ST=Coast, C=KE" \
              -storepass cipassword -keypass cipassword 2>/dev/null
            echo "Using CI-generated keystore"
          fi

      - name: Inject signing config into build.gradle
        run: |
          STOREPASS="${{ secrets.KEYSTORE_STOREPASS || 'cipassword' }}"
          KEYPASS="${{ secrets.KEYSTORE_KEYPASS || 'cipassword' }}"
          KEYALIAS="${{ secrets.KEYSTORE_ALIAS || 'royal-quads' }}"
          python3 - "$STOREPASS" "$KEYPASS" "$KEYALIAS" << 'PYEOF'
import sys, re

storepass, keypass, keyalias = sys.argv[1], sys.argv[2], sys.argv[3]

with open('android/app/build.gradle', 'r') as f:
    content = f.read()

signing_block = f"""
    signingConfigs {{
        release {{
            storeFile file("royal-quads.keystore")
            storePassword "{storepass}"
            keyAlias "{keyalias}"
            keyPassword "{keypass}"
        }}
    }}
"""

# Insert signingConfigs before buildTypes
content = content.replace('    buildTypes {', signing_block + '    buildTypes {', 1)

# Add signingConfig to release buildType (first occurrence only)
content = content.replace(
    'release {\n            signingConfig signingConfigs.release',
    'release {',
    1
)
content = re.sub(
    r'(buildTypes\s*\{[^}]*?release\s*\{)',
    r'\1\n            signingConfig signingConfigs.release',
    content,
    count=1,
    flags=re.DOTALL
)

with open('android/app/build.gradle', 'w') as f:
    f.write(content)
print("Signing config injected successfully.")
PYEOF

      # ── Build release APK ────────────────────────────────────────────────────
      - name: Build release APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease --no-daemon 2>&1 | tail -30

      - name: Stage APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk "output/Royal-Quads-v${APP_VERSION}.apk"
          ls -lh output/

      # ── Artifacts & Release ──────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-v${{ env.APP_VERSION }}
          path: output/Royal-Quads-v${{ env.APP_VERSION }}.apk
          retention-days: 90

      - name: Generate release tag
        id: tag
        run: |
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "tag=v${APP_VERSION}-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Royal Quad Bikes v${{ env.APP_VERSION }}"
          body: |
            ## 🏍️ Royal Quad Bikes v${{ env.APP_VERSION }}

            Download **Royal-Quads-v${{ env.APP_VERSION }}.apk** below and install on your Android device.

            > **Install steps**
            > 1. Download the APK
            > 2. On your phone: **Settings → Security → Install unknown apps** → enable for your browser/Files app
            > 3. Open the APK and tap **Install**

            ---

            ### What's new in v5.0.0
            - 📊 **Today's Revenue Bar** — admins see live earnings on the Home screen
            - 🔐 **Signed release APK** — R8 minification + proper signing
            - 🔢 **Auto version sync** — versionCode/versionName synced from package.json
            - 📦 **Smaller APK** — minifyEnabled + proguard-android-optimize

          files: output/Royal-Quads-v${{ env.APP_VERSION }}.apk
          draft: false
          prerelease: false
