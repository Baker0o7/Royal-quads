name: Build & Release Flutter APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Write local.properties & create debug keystore
        run: |
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_ROOT" "$ANDROID_HOME" \
            > android/local.properties
          cat android/local.properties
          chmod +x android/gradlew

          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            > /dev/null 2>&1

      - name: Flutter pub get
        run: flutter pub get

      - name: Inject app icons
        run: |
          pip install Pillow --quiet
          python3 scripts/inject-icons.py

      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --android-skip-build-dependency-validation

      - name: Stage APK
        run: |
          mkdir -p output
          # flutter build apk outputs here in 3.27.4
          APK="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK" ]; then
            # fallback: search entire build tree
            APK=$(find build -name "app-release.apk" 2>/dev/null | head -1)
          fi
          echo "APK: $APK  (size: $(du -sh "$APK" 2>/dev/null | cut -f1))"
          cp "$APK" output/Royal-Quads.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Quads-APK
          path: output/Royal-Quads.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Royal Quad Bikes ${{ github.ref_name }}
          body: |
            ## Royal Quad Bikes ${{ github.ref_name }}

            Android APK -- install directly on any Android device.

            > **Before installing:** Settings > Apps > Special app access > Install unknown apps > Allow

            ### What is in this build
            - 6 colour themes (Desert Gold, Ocean Breeze, Forest Night, Midnight Purple, Crimson Sunset, Slate Pro)
            - Dark / Light mode toggle
            - Interactive offline map of Mambrui Sand Dunes (save for no-internet use)
            - OTP verification on sign-up
            - End-of-Day PDF report, dynamic pricing, loyalty points
            - Peak hours heatmap, quad utilisation charts
            - Incident reporting, emergency contacts
            - Animated splash + onboarding, confetti ride complete screen
            - Booking ticket with QR code, PDF receipt with gold design
            - Live ride timer, M-Pesa capture, WhatsApp confirmation

            ### Install
            1. Download **Royal-Quads.apk** below
            2. Open on your Android phone and tap **Install**
            3. If blocked: Settings > Security > Install unknown apps > Allow
          files: output/Royal-Quads.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
