pluginManagement {
    def flutterSdkPath = {
        def props = new Properties()
        def localProps = file("local.properties")
        if (localProps.exists()) {
            localProps.withInputStream { props.load(it) }
        }
        def path = props.getProperty("flutter.sdk") ?: System.getenv("FLUTTER_ROOT")
        assert path != null, "flutter.sdk not set in local.properties and FLUTTER_ROOT env var is empty"
        return path
    }()

    // Expose SDK path to other scripts
    settings.ext.flutterSdkPath = flutterSdkPath

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    // Explicit versions for AGP and Kotlin so Gradle can resolve them
    // from google() / gradlePluginPortal() without needing a buildscript block.
    // NOTE: dev.flutter.flutter-gradle-plugin is intentionally NOT listed here —
    // it must be resolved exclusively through the includeBuild above, not from
    // Maven. Listing it here with a version causes Gradle to attempt Maven
    // resolution first and breaks the engine classpath setup.
    plugins {
        id "com.android.application"      version "8.3.2"
        id "com.android.library"          version "8.3.2"
        id "org.jetbrains.kotlin.android" version "1.9.24"
    }
}

// Top-level plugins block: dev.flutter.flutter-gradle-plugin is resolved
// here (outside pluginManagement.plugins) so Gradle routes it through the
// pluginManagement includeBuild only — no version needed or wanted.
plugins {
    id "dev.flutter.flutter-gradle-plugin" apply false
}

include ":app"
