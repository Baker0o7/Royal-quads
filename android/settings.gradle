pluginManagement {
    def flutterSdkPath = {
        // 1. Try local.properties (local dev)
        def props = new Properties()
        def localProps = file("local.properties")
        if (localProps.exists()) {
            localProps.withInputStream { props.load(it) }
        }
        // 2. Fall back to FLUTTER_ROOT env var (CI / GitHub Actions)
        def path = props.getProperty("flutter.sdk") ?: System.getenv("FLUTTER_ROOT")
        assert path != null, "flutter.sdk not set in local.properties and FLUTTER_ROOT env var is empty"
        return path
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
}

include ":app"
