pluginManagement {
    def flutterSdkPath = {
        def props = new Properties()
        def localProps = file("local.properties")
        if (localProps.exists()) {
            localProps.withInputStream { props.load(it) }
        }
        def path = props.getProperty("flutter.sdk") ?: System.getenv("FLUTTER_ROOT")
        assert path != null, "flutter.sdk not set in local.properties and FLUTTER_ROOT env var is empty"
        return path
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    // Explicit versions so Gradle can resolve these from google() without the
    // includeBuild needing to re-export them. Required by Gradle 7.6+ plugin system.
    plugins {
        id "com.android.application" version "8.7.3"
        id "com.android.library"     version "8.7.3"
        id "org.jetbrains.kotlin.android" version "2.1.0"
        id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    }
}

include ":app"
