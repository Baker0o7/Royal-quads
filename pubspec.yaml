name: royal_quad_bikes
description: Royal Quad Bikes — Mambrui Sand Dunes booking app
publish_to: none
version: 2.7.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.7

  # Storage
  shared_preferences: ^2.3.2

  # Google Sign-In
  google_sign_in: ^6.2.1

  # HTTP
  http: ^1.2.2

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.2

  # Charts
  fl_chart: ^0.69.0

  # URL launcher (WhatsApp)
  url_launcher: ^6.3.1

  # Intl
  intl: ^0.19.0

  # UUID
  uuid: ^4.5.1

  # Lottie animations
  lottie: ^3.1.3

  # Image picker
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Playfair
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
