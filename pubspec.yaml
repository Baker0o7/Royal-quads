name: royal_quad_bikes
description: Royal Quad Bikes — Mambrui Sand Dunes booking app
publish_to: none
version: 4.9.2+108

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.7

  # Storage
  shared_preferences: ^2.3.2

  # PDF receipt
  pdf: ^3.11.1
  printing: ^5.13.2

  # WhatsApp / URL opening
  url_launcher: ^6.3.1
  http: ^1.1.0

  # Charts (admin dashboard)
  fl_chart: ^0.66.2

  # QR code (receipt + status)
  qr_flutter: ^4.1.0

  # Confetti (ride complete)
  confetti: ^0.7.0


  # Offline map
  path_provider: ^2.1.4

  # Live ride notification
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
