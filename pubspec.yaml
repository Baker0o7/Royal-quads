name: royal_quad_bikes
description: Royal Quad Bikes — Mambrui Sand Dunes booking app
publish_to: none
version: 2.9.2+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.7

  # Storage
  shared_preferences: ^2.3.2

  # Google Sign-In
  google_sign_in: ^6.2.1

  # PDF receipt
  pdf: ^3.11.1
  printing: ^5.13.2

  # WhatsApp / URL opening
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
